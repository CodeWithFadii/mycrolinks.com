[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[context.production.environment]
  # Add your GH_PAT and GH_USERNAME here in Netlify dashboard if you want to run fetcher during build
  # To enable fetcher, change build command to: "node fetch-projects.js && npm run build"
